name: Feature Request
description: Suggest an improvement or new capability for the template project
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for the **framework core** (routing, middleware, kernel, etc.) belong in the
        [PHP Simple Framework repository](https://github.com/Ondottr/PHP_SF_Platform/issues).
        Open this request here for template-specific things (project structure, tooling, Docker setup, etc.).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you unable to do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have tried or thought about.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
