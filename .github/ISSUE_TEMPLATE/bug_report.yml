name: Bug Report
description: Something is not working as expected in the template project
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please check the [documentation](https://wiki.nations-original.com/en/framework) and search existing issues.
        For security vulnerabilities, see [SECURITY.md](../SECURITY.md) — do not open a public issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Configure X as ...
        2. Run `bin/console ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error message / stack trace if available.
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "8.3.x"
    validations:
      required: true

  - type: input
    id: framework_version
    attributes:
      label: PHP Simple Framework version
      description: Run `composer show nations-original/php-simple-framework` to get the version.
      placeholder: "1.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11 + WSL2"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (config snippets, related issues, etc.)
    validations:
      required: false
