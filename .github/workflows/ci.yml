name: CI

# Triggered manually, via GitHub API (repository_dispatch from a webhook),
# or automatically when the workflow file itself changes.
on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-ci]
  push:
    paths:
      - .github/workflows/ci.yml

env:
  # ── Application ────────────────────────────────────────────────────────────
  APP_ENV: test
  APP_SECRET: $ecretf0rt3st
  SERVER_PREFIX: ""

  # ── PostgreSQL (main EM) ────────────────────────────────────────────────────
  DATABASE_MAIN_HOST: postgres
  DATABASE_MAIN_PORT: "5432"
  DATABASE_MAIN_USER: user
  DATABASE_MAIN_PASSWORD: password
  DATABASE_MAIN_DBNAME: php-sf-playground-db-postgresql
  DATABASE_MAIN_VERSION: "16"

  # ── MySQL (products EM) ────────────────────────────────────────────────────
  DATABASE_PRODUCTS_HOST: mysql
  DATABASE_PRODUCTS_PORT: "3306"
  DATABASE_PRODUCTS_USER: user
  DATABASE_PRODUCTS_PASSWORD: password
  DATABASE_PRODUCTS_DBNAME: php-sf-playground-db-mysql
  DATABASE_PRODUCTS_VERSION: "8.0.0"

  # ── MariaDB (payments EM) ───────────────────────────────────────────────────
  DATABASE_PAYMENTS_HOST: mariadb
  DATABASE_PAYMENTS_PORT: "3306"
  DATABASE_PAYMENTS_USER: user
  DATABASE_PAYMENTS_PASSWORD: password
  DATABASE_PAYMENTS_DBNAME: php-sf-playground-db-mariadb
  DATABASE_PAYMENTS_VERSION: "mariadb-11.0.0"

  # ── Cache ───────────────────────────────────────────────────────────────────
  REDIS_CACHE_URL: redis://redis:6379/10
  MEMCACHED_SERVER: memcached
  MEMCACHED_PORT: "11211"

  # ── Messaging ───────────────────────────────────────────────────────────────
  MESSENGER_TRANSPORT_DSN: amqp://admin:admin@rabbitmq:5672/%2f

jobs:
  test:
    name: Test suite
    runs-on: self-hosted

    container:
      image: ghcr.io/ondottr/php-sf-ci:latest
      options: --user root

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: php-sf-playground-db-postgresql
        options: >-
          --health-cmd "pg_isready -U user -d php-sf-playground-db-postgresql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: php-sf-playground-db-mysql
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u user --password=password"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      mariadb:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: php-sf-playground-db-mariadb
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

      memcached:
        image: memcached:alpine

      rabbitmq:
        image: rabbitmq:latest
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: admin
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 20

      selenium:
        image: selenium/standalone-firefox:latest
        options: --shm-size=2g

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout PHP_SF_Template
        uses: actions/checkout@v4
        with:
          repository: Ondottr/PHP_SF_Template
          ref: master

      - name: Checkout PHP_SF_Platform
        uses: actions/checkout@v4
        with:
          repository: Ondottr/PHP_SF_Platform
          ref: master
          path: Platform

      # ── Bootstrap config files ────────────────────────────────────────────────
      # constants.php is required by bin/console at bootstrap time.
      # .env must exist for Symfony Dotenv bootEnv(); workflow env vars override values inside it.
      - name: Generate constants.php and .env
        run: |
          cp config/constants.example.php config/constants.php
          cp .env.example .env

      - name: Generate entity and repository stubs
        run: sh docker/ci-init.sh

      # ── Grant MySQL / MariaDB privileges ──────────────────────────────────────
      # The docker service env only creates the user on MYSQL_DATABASE; we need
      # global privileges to match the init.sql used in dev (docker/mysql/init.sql).
      - name: Grant MySQL privileges
        run: |
          mysql -h mysql -u root -prootpassword \
            -e "GRANT ALL PRIVILEGES ON *.* TO 'user'@'%'; FLUSH PRIVILEGES;"

      - name: Grant MariaDB privileges
        run: |
          mysql -h mariadb -u root -prootpassword \
            -e "GRANT ALL PRIVILEGES ON *.* TO 'user'@'%'; FLUSH PRIVILEGES;"

      # ── PHP dependencies ──────────────────────────────────────────────────────
      - name: Composer install
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: npm install
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── Database setup ────────────────────────────────────────────────────────
      - name: Create databases
        run: |
          bin/console doctrine:database:create --if-not-exists --connection=main
          bin/console doctrine:database:create --if-not-exists --connection=products
          bin/console doctrine:database:create --if-not-exists --connection=payments

      - name: Create schemas
        run: |
          bin/console doctrine:schema:create --em=main
          bin/console doctrine:schema:create --em=products
          bin/console doctrine:schema:create --em=payments

      - name: Load fixtures
        run: bin/console doctrine:fixtures:load --no-interaction --em=main

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: PHPUnit
        run: bin/phpunit --coverage-text

      - name: Codeception — Unit
        run: vendor/bin/codecept run Unit

      - name: Codeception — Functional
        run: vendor/bin/codecept run Functional

      - name: Codeception — Acceptance
        run: vendor/bin/codecept run Acceptance
