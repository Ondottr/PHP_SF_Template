name: Staging Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    name: Deploy pr-${{ github.event.pull_request.number }}
    runs-on: self-hosted

    permissions:
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      APP_IMAGE: php-sf-template:pr-${{ github.event.pull_request.number }}
      STAGING_URL: https://pr-${{ github.event.pull_request.number }}.phpsf-staging.nations-original.eu

    steps:
      - name: Ensure nginx-proxy infrastructure is running
        run: |
          docker network create nginx-proxy 2>/dev/null || true
          if docker container inspect nginx-proxy >/dev/null 2>&1; then
            docker start nginx-proxy 2>/dev/null || true
          else
            docker run -d \
              --name nginx-proxy \
              -p 127.0.0.1:1888:80 \
              -v /var/run/docker.sock:/tmp/docker.sock:ro \
              --restart unless-stopped \
              nginxproxy/nginx-proxy
          fi
          docker network connect nginx-proxy nginx-proxy 2>/dev/null || true

      - name: Checkout PHP_SF_Template
        uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build staging image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build \
            -f docker/staging.Dockerfile \
            --build-arg SERVER_IP=${{ secrets.CI_SERVER_PUBLIC_IP }} \
            -t ${{ env.APP_IMAGE }} \
            .

      - name: Tear down previous deployment
        id: teardown
        run: |
          # If DBs are already healthy, only stop the app container so DBs don't need to reinitialise.
          # Full teardown (with volume wipe) only happens on the very first deploy for this PR.
          if PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
              docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              ps -q postgres 2>/dev/null | grep -q .; then
            PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
            docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              stop app 2>/dev/null || true
            echo "fresh=false" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
            docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              down -v --remove-orphans 2>/dev/null || true
            echo "fresh=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy
        run: |
          PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
          docker compose \
            -p pr-${{ env.PR_NUMBER }} \
            -f docker/staging/docker-compose.yml \
            up -d --wait

      - name: Dump app logs on failure
        if: failure()
        run: |
          PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
          docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
            logs app

      - name: Create databases and schemas
        if: steps.teardown.outputs.fresh == 'true'
        run: |
          for em in main products payments; do
            PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
            docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              exec -T app php bin/console doctrine:database:create --if-not-exists --connection=$em
            PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
            docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              exec -T app php bin/console doctrine:schema:create --em=$em
          done

      - name: Load fixtures
        if: steps.teardown.outputs.fresh == 'true'
        run: |
          PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
          docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
            exec -T app php bin/console doctrine:fixtures:load --no-interaction --em=main

      - name: Inject SSH public key
        run: |
          docker exec pr-${{ env.PR_NUMBER }}-app-1 sh -c \
            'echo "${{ secrets.STAGING_SSH_PUBLIC_KEY }}" >> /root/.ssh/authorized_keys'

      - name: Get container IP
        id: container_ip
        run: |
          IP=$(docker inspect pr-${{ env.PR_NUMBER }}-app-1 \
            --format '{{index .NetworkSettings.Networks "nginx-proxy" "IPAddress"}}')
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Post staging URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- staging-deploy -->';
            const ip = '${{ steps.container_ip.outputs.ip }}';
            const body = [
              marker,
              '### Staging environment',
              '',
              `**URL:** ${{ env.STAGING_URL }}`,
              '',
              '**SSH access** (requires your key on GitHub):',
              '```bash',
              `ssh -J fastuser@${{ secrets.CI_SERVER_PUBLIC_IP }}:2724 root@${ip}`,
              '```',
              '',
              '**Forward services locally:**',
              '```bash',
              `ssh -J fastuser@${{ secrets.CI_SERVER_PUBLIC_IP }}:2724 root@${ip} -L 5432:postgres:5432 -L 3306:mysql:3306 -L 6379:redis:6379 -L 15672:rabbitmq:15672 -N`,
              '```',
              '',
              '| Service | Forwarded port |',
              '|---------|---------------|',
              '| PostgreSQL | 5432 |',
              '| MySQL | 3306 |',
              '| Redis | 6379 |',
              '| RabbitMQ management | 15672 |',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  test:
    name: Test suite
    needs: deploy
    runs-on: self-hosted

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: PHPUnit
        run: |
          docker exec -e APP_ENV=test pr-${{ env.PR_NUMBER }}-app-1 \
            vendor/bin/phpunit \
              --bootstrap tests/bootstrap.php \
              --configuration phpunit.xml.dist \
              vendor/nations-original/php-simple-framework/tests

      - name: Codeception — Unit
        run: |
          docker exec -e APP_ENV=test pr-${{ env.PR_NUMBER }}-app-1 \
            vendor/bin/codecept run Unit

      - name: Codeception — Functional
        run: |
          docker exec -e APP_ENV=test pr-${{ env.PR_NUMBER }}-app-1 \
            vendor/bin/codecept run Functional
