name: Staging Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    name: Deploy pr-${{ github.event.pull_request.number }}
    runs-on: self-hosted

    permissions:
      contents: read
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      APP_IMAGE: php-sf-template:pr-${{ github.event.pull_request.number }}
      STAGING_URL: https://pr-${{ github.event.pull_request.number }}.phpsf-staging.nations-original.eu

    steps:
      - name: Ensure nginx-proxy infrastructure is running
        run: |
          docker network create nginx-proxy 2>/dev/null || true
          docker inspect nginx-proxy >/dev/null 2>&1 || \
          docker run -d \
            --name nginx-proxy \
            --network nginx-proxy \
            -p 127.0.0.1:1888:80 \
            -v /var/run/docker.sock:/tmp/docker.sock:ro \
            --restart unless-stopped \
            nginxproxy/nginx-proxy

      - name: Checkout PHP_SF_Template
        uses: actions/checkout@v4

      - name: Checkout PHP_SF_Platform
        uses: actions/checkout@v4
        with:
          repository: Ondottr/PHP_SF_Platform
          ref: master
          path: Platform

      - name: Build staging image
        run: |
          docker build \
            -f docker/staging.Dockerfile \
            -t ${{ env.APP_IMAGE }} \
            .

      - name: Tear down previous deployment
        run: |
          PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
          docker compose \
            -p pr-${{ env.PR_NUMBER }} \
            -f docker/staging/docker-compose.yml \
            down -v --remove-orphans 2>/dev/null || true

      - name: Deploy
        run: |
          PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
          docker compose \
            -p pr-${{ env.PR_NUMBER }} \
            -f docker/staging/docker-compose.yml \
            up -d --wait

      - name: Create databases and schemas
        run: |
          for em in main products payments; do
            PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
            docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              exec -T app php bin/console doctrine:database:create --if-not-exists --em=$em
            PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
            docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
              exec -T app php bin/console doctrine:schema:create --em=$em
          done

      - name: Load fixtures
        run: |
          PR_NUMBER=${{ env.PR_NUMBER }} APP_IMAGE=${{ env.APP_IMAGE }} \
          docker compose -p pr-${{ env.PR_NUMBER }} -f docker/staging/docker-compose.yml \
            exec -T app php bin/console doctrine:fixtures:load --no-interaction --em=main

      - name: Post staging URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- staging-deploy -->';
            const body = `${marker}\n🚀 **Staging:** ${{ env.STAGING_URL }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
