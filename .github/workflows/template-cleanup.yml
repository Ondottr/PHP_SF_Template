name: Template Cleanup

# Runs once when a new repository is created from this template.
# Removes all infrastructure files that are specific to the template maintainer
# (CI workflows, Docker staging setup, etc.) and then self-destructs.
#
# Does nothing when triggered on the original template repository itself.
on:
  push:
    branches: [master, main]

jobs:
  cleanup:
    name: Remove template-specific files
    runs-on: ubuntu-latest
    if: github.repository != 'Ondottr/PHP_SF_Template'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Remove maintainer-specific files
        run: |
          # CI/CD workflows
          rm -f .github/workflows/build-image.yml
          rm -f .github/workflows/staging-deploy.yml
          rm -f .github/workflows/staging-cleanup.yml

          # Docker / staging infrastructure
          rm -f .dockerignore
          rm -f docker/Dockerfile
          rm -f docker/staging.Dockerfile
          rm -f docker/staging-entrypoint.sh
          rm -f docker/ci-init.sh
          rm -rf docker/staging

          # Maintainer-specific GitHub config
          rm -f .github/CODEOWNERS

          # Self-destruct
          rm -f .github/workflows/template-cleanup.yml

      - name: Commit cleanup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: remove template-specific CI and staging files"
          git push
