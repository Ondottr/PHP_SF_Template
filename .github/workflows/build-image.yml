name: Build CI Image

# Rebuilds and pushes the CI container image to GHCR whenever the Dockerfile changes.
# Also triggerable manually to force a rebuild.
on:
  push:
    branches: [master, main]
    paths:
      - docker/Dockerfile
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ondottr/php-sf-ci

jobs:
  build:
    name: Build & push
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker
          push: true
          # Cache layers between builds using the registry itself
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
